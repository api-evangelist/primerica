description: Primerica is a life-insurance and financial-services company that distributes products
  through a captive sales force. There is no public developer portal, no published API pricing, and no
  self-service plan structure. Any system integration is partner / B2B and negotiated under a contract.
notes: No public developer portal or API pricing page exists. Reconciliation reduced the scaffold to
  a single Contact Sales plan; do not infer tier prices or quotas.
sources:
  - https://www.primerica.com/
