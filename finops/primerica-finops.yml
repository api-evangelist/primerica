principles:
  - name: Visibility
    description: No public usage telemetry; cost visibility flows from contract invoices and partner
      reporting only.
  - name: Allocation
    description: Allocate by partner agreement and integration scope; no per-call attribution surface
      is published.
  - name: Optimization
    description: Optimization is contractual — renegotiate volume, scope, and SLA at renewal; no public
      autoscaling or commitment levers exist.
  - name: Accountability
    description: Spend is owned by the partnership / business-development relationship, not by an engineering
      consumption budget.
