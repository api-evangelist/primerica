description: FOCUS-aligned FinOps shape for Primerica. No public API or usage-billing surface exists;
  any cost flow is governed by partner contracts.
notes: No public billing or usage telemetry. The FinOps record is a placeholder pointing at contract-driven
  cost rather than a metered API surface.
